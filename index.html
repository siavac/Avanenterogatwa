<!DOCTYPE html>
<html lang="ht">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dokiman Ofisyèl SIAVAC</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#202020;
font-family:Arial,sans-serif;
padding:10px;
}


/* FÈY LEGAL 8.5x14 RESPONSIVE */

.page{

width:100%;
max-width:816px;

aspect-ratio:8.5 / 14;

background:white;

margin:auto;

padding:35px 30px;

position:relative;

overflow:hidden;

}



/* LOGO */

.logo{

text-align:center;

margin-bottom:10px;

}


.logo img{

width:130px;

max-width:40%;

height:auto;

}



/* HEADER */

.header{

text-align:center;

border-bottom:3px solid #111;

padding-bottom:12px;

}


.header h1{

margin:5px;

font-size:28px;

}


.header p{

margin:5px;

font-size:14px;

}



/* ZÒN TÈKS */

.content{

margin-top:20px;

height:70%;

border:1px solid #ccc;

border-radius:5px;

padding:15px;

font-size:15px;

line-height:1.6;

white-space:pre-wrap;

outline:none;

overflow:hidden;

}



/* FOOTER */

.footer{

position:absolute;

bottom:25px;

left:30px;

right:30px;

text-align:center;

border-top:1px solid #aaa;

padding-top:8px;

font-size:12px;

color:#555;

}



/* BOUTON */

button{

display:block;

width:90%;

max-width:350px;

margin:15px auto;

padding:14px;

background:#111;

color:white;

border:none;

border-radius:8px;

font-size:16px;

}



@media(max-width:500px){


body{

padding:5px;

}


.page{

padding:20px 15px;

}


.logo img{

width:90px;

}


.header h1{

font-size:22px;

}


.header p{

font-size:12px;

}


.content{

font-size:13px;

padding:10px;

}


.footer{

font-size:10px;

}

}



/* ENPRIME */

@media print{

body{

background:white;

padding:0;

}


button{

display:none;

}


.page{

max-width:none;

width:8.5in;

height:14in;

aspect-ratio:auto;

}

}

</style>


</head>


<body>


<div class="page" id="dokiman">


<div class="logo">

<img crossorigin="anonymous"
src="https://i.ibb.co/zTz2rrh8/sketch-1782265870898.jpg"
alt="Logo SIAVAC">

</div>



<div class="header">

<h1>SIAVAC</h1>

<p><b>Sèvis Entèlijans Anti-Vòl ak Anti-Krim</b></p>

<p>
Email: siavacsecurity@gmail.com<br>
Telefòn: 35379836
</p>

</div>




<div class="content" contenteditable="true">

Kole tèks dokiman ou la isit la...


</div>




<div class="footer">

© SIAVAC - Dokiman Ofisyèl<br>

Sèvis Entèlijans Anti-Vòl ak Anti-Krim

</div>


</div>



<button onclick="window.print()">

🖨️ Enprime / Sove kòm PDF

</button>


<button onclick="telechajeImaj()">

📷 Telechaje kòm imaj Legal 8.5x14

</button>



<script>

function telechajeImaj(){


let dokiman=document.querySelector("#dokiman");


html2canvas(dokiman,{

scale:3,

useCORS:true,

allowTaint:false


}).then(canvas=>{


let lyen=document.createElement("a");


lyen.download="SIAVAC-Dokiman-Legal-8.5x14.png";


lyen.href=canvas.toDataURL("image/png");


lyen.click();


});


}

</script>


</body>
</html>
