<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dokiman Ofisyèl SIAVAC</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#202020;
font-family:Arial, sans-serif;
padding:10px;
}

.page{
width:100%;
max-width:800px;
min-height:100vh;
background:white;
margin:auto;
padding:25px 18px;
border-radius:8px;
position:relative;
}


.logo{
text-align:center;
margin-bottom:15px;
}

.logo img{
width:150px;
max-width:80%;
height:auto;
}


.header{
text-align:center;
border-bottom:3px solid #111;
padding-bottom:15px;
}


.header h1{
margin:5px;
font-size:28px;
font-weight:bold;
}


.header p{
margin:5px;
font-size:14px;
}


.content{

margin-top:20px;
min-height:500px;

border:1px solid #ccc;
border-radius:5px;

padding:15px;

font-size:16px;
line-height:1.7;

white-space:pre-wrap;

outline:none;

}


.footer{

margin-top:40px;

text-align:center;

border-top:1px solid #aaa;

padding-top:10px;

font-size:12px;

color:#555;

}



button{

display:block;

width:90%;

max-width:350px;

margin:15px auto;

padding:14px;

background:#111;

color:white;

border:none;

border-radius:8px;

font-size:17px;

}



@media(max-width:500px){

.page{

padding:20px 12px;

}


.logo img{

width:120px;

}


.header h1{

font-size:24px;

}


.content{

font-size:15px;

min-height:450px;

}

}



@media print{

body{

background:white;

padding:0;

}


button{

display:none;

}


.page{

border-radius:0;

max-width:none;

}

}

</style>

</head>


<body>


<div class="page" id="dokiman">


<div class="logo">

<img src="https://i.ibb.co/zTz2rrh8/sketch-1782265870898.jpg" alt="Logo Ofisyèl SIAVAC">

</div>



<div class="header">

<h1>SIAVAC</h1>

<p><b>Sèvis Entèlijans Anti-Vòl ak Anti-Krim</b></p>

<p>
Email: siavacsecurity@gmail.com<br>
Telefòn: 35379836
</p>

</div>




<div class="content" contenteditable="true">

Kole tèks dokiman ou la isit la...


</div>




<div class="footer">

© SIAVAC - Dokiman Ofisyèl<br>

Sèvis Entèlijans Anti-Vòl ak Anti-Krim

</div>


</div>



<button onclick="window.print()">

🖨️ Enprime / Sove kòm PDF

</button>


<button onclick="telechajeImaj()">

📷 Telechaje kòm imaj PNG

</button>



<script>

function telechajeImaj(){

html2canvas(document.querySelector("#dokiman"), {
scale: 2
}).then(canvas => {

let lyen = document.createElement("a");

lyen.download = "Dokiman-SIAVAC.png";

lyen.href = canvas.toDataURL("image/png");

lyen.click();

});

}

</script>


</body>
</html>
